<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GameHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>GameHub</h1>
    <div id="navbar">
        <button onclick="menu('tictactoe')">Tic Tac Toe</button>
        <button onclick="loadGame('rps')">Rock Paper Scissors</button>
        <button onclick="loadGame('snake')">Snake</button>
    </div>
    
    <div id="main-container">
        <div id="game-area"></div>

        <div id="scorecard" class="hidden">
            <h3 id='score-title'>Score Card</h3>
            <div id="scores"></div>
        </div>
    </div>

    <script src="script.js"></script>


</body>
</html>
